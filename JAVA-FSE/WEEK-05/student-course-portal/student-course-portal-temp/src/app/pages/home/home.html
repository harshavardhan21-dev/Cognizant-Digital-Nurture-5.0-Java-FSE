<h1>Welcome {{ studentName }}</h1>

<p>Course : {{ course }}</p>

<p>GPA : {{ gpa }}</p>

<img [src]="courseImage" width="120">

<br><br>

<button (click)="showMessage()">Click Me</button>

<p>{{ message }}</p>

<hr>

<input
type="text"
[(ngModel)]="inputName"
placeholder="Enter your name">

<p>You entered : {{ inputName }}</p>

<hr>

<h2 *ngIf="showCourses">Available Courses</h2>

<ul>
    <li *ngFor="let c of courses">
        {{ c }}
    </li>
</ul>
