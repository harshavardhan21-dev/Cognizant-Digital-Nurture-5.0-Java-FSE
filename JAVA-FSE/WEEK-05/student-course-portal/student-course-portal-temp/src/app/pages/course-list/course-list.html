<h2>Course List</h2>

<p>Today's Date : {{ today | date }}</p>

<p *ngIf="errorMessage">{{ errorMessage }}</p>

<div *ngFor="let c of courses">
  <app-course-card [course]="c"></app-course-card>
</div>

<h3>Students Enrolled in First Course</h3>

<ul>
  <li *ngFor="let s of students">
    {{ s.name }}
  </li>
</ul>
